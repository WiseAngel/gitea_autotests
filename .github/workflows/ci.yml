name: Gitea CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # -----------------------------------------------------------------------
  # Lint
  # -----------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Lint
        run: |
          ruff check src tests scripts
          ruff format --check src tests scripts
          mypy src

  # -----------------------------------------------------------------------
  # API tests (no browser needed)
  # -----------------------------------------------------------------------
  api-tests:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Run API tests (shard ${{ matrix.shard }}/2)
        run: >
          pytest
          -m "api and not ui"
          --shard=${{ matrix.shard }}/2
          --alluredir=allure-results
          --junit-xml=api-results-shard${{ matrix.shard }}.xml
          --json-report --json-report-file=report-api-shard${{ matrix.shard }}.json
          --reruns 2 --reruns-delay 3
        env:
          BASE_URL: https://gitea.com
          API_BASE_URL: https://gitea.com/api/v1
          API_TOKEN: ${{ secrets.GITEA_API_TOKEN }}
          GITEA_USERNAME: ${{ secrets.GITEA_USERNAME }}
          GITEA_PASSWORD: ${{ secrets.GITEA_PASSWORD }}

      - name: Upload API artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-artifacts-shard${{ matrix.shard }}
          path: |
            allure-results/
            api-results-shard${{ matrix.shard }}.xml
            report-api-shard${{ matrix.shard }}.json
          retention-days: 7

  # -----------------------------------------------------------------------
  # UI tests — browser matrix × shard matrix
  # -----------------------------------------------------------------------
  ui-tests:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: playwright-${{ runner.os }}-${{ matrix.browser }}-

      - name: Install Playwright browser
        run: |
          playwright install ${{ matrix.browser }}
          playwright install-deps ${{ matrix.browser }}

      - name: Run UI tests (${{ matrix.browser }} shard ${{ matrix.shard }}/2)
        run: >
          pytest
          -m ui
          --browser ${{ matrix.browser }}
          --shard=${{ matrix.shard }}/2
          --alluredir=allure-results
          --junit-xml=ui-results-${{ matrix.browser }}-shard${{ matrix.shard }}.xml
          --json-report --json-report-file=report-ui-${{ matrix.browser }}-shard${{ matrix.shard }}.json
          --reruns 2 --reruns-delay 3
        env:
          BASE_URL: https://gitea.com
          API_BASE_URL: https://gitea.com/api/v1
          API_TOKEN: ${{ secrets.GITEA_API_TOKEN }}
          GITEA_USERNAME: ${{ secrets.GITEA_USERNAME }}
          GITEA_PASSWORD: ${{ secrets.GITEA_PASSWORD }}

      - name: Upload UI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-artifacts-${{ matrix.browser }}-shard${{ matrix.shard }}
          path: |
            allure-results/
            ui-results-${{ matrix.browser }}-shard${{ matrix.shard }}.xml
            report-ui-${{ matrix.browser }}-shard${{ matrix.shard }}.json
            playwright-report/
            screenshots/
          retention-days: 7

  # -----------------------------------------------------------------------
  # Merge all allure-results and publish to GitHub Pages
  # -----------------------------------------------------------------------
  publish-allure:
    needs: [api-tests, ui-tests]
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all allure-results artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Merge allure-results into single directory
        run: |
          mkdir -p allure-results
          find downloaded-artifacts -type f \( -name "*.json" -o -name "*.xml" -o -name "*.png" \) \
            -exec cp {} allure-results/ \; || true

      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline --save-dev
          allure --version

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          destination_dir: allure
