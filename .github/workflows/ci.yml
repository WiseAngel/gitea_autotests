name: Gitea CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  GITEA_ADMIN_USER: testadmin
  GITEA_ADMIN_PASS: testadmin123
  GITEA_BASE_URL: http://localhost:3000
  GITEA_API_URL: http://localhost:3000/api/v1

jobs:
  # -------------------------------------------------------------------------
  # Lint
  # -------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint
        run: |
          ruff check src tests scripts
          ruff format --check src tests scripts
          mypy src

  # -------------------------------------------------------------------------
  # API tests (no browser needed, no Gitea UI required)
  # -------------------------------------------------------------------------
  api-tests:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    services:
      gitea:
        image: gitea/gitea:latest
        ports:
          - 3000:3000
        env:
          GITEA__security__INSTALL_LOCK: "true"
          GITEA__server__ROOT_URL: http://localhost:3000
          GITEA__database__DB_TYPE: sqlite3
        options: >-
          --health-cmd "wget -qO- http://localhost:3000/api/healthz || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Create Gitea admin user and generate token
        id: seed
        run: |
          GITEA_CTR=$(docker ps -q --filter ancestor=gitea/gitea:latest)
          docker exec -u git $GITEA_CTR gitea admin user create \
            --username ${{ env.GITEA_ADMIN_USER }} \
            --password ${{ env.GITEA_ADMIN_PASS }} \
            --email ${{ env.GITEA_ADMIN_USER }}@example.com \
            --admin --must-change-password=false
          TOKEN=$(docker exec -u git $GITEA_CTR gitea admin user generate-access-token \
            --username ${{ env.GITEA_ADMIN_USER }} \
            --token-name ci-token --raw)
          echo "api_token=$TOKEN" >> $GITHUB_OUTPUT
          echo "Token generated: ${TOKEN:0:8}..."

      - name: Seed Gitea instance
        run: python scripts/seed_gitea.py
        env:
          BASE_URL: ${{ env.GITEA_BASE_URL }}
          GITEA_USERNAME: ${{ env.GITEA_ADMIN_USER }}
          GITEA_PASSWORD: ${{ env.GITEA_ADMIN_PASS }}
          API_TOKEN: ${{ steps.seed.outputs.api_token }}

      - name: Run API tests (group ${{ matrix.shard }}/2)
        run: >
          pytest
          -m "api and not ui"
          --splits=2 --group=${{ matrix.shard }}
          --alluredir=allure-results
          --junit-xml=api-results-shard${{ matrix.shard }}.xml
          --reruns 2 --reruns-delay 3
        env:
          BASE_URL: ${{ env.GITEA_BASE_URL }}
          API_BASE_URL: ${{ env.GITEA_API_URL }}
          GITEA_USERNAME: ${{ env.GITEA_ADMIN_USER }}
          GITEA_PASSWORD: ${{ env.GITEA_ADMIN_PASS }}
          API_TOKEN: ${{ steps.seed.outputs.api_token }}
          QASE_MODE: testops
          QASE_TESTOPS_PROJECT: GITEA
          QASE_TESTOPS_API_TOKEN: ${{ secrets.TMS_TOKEN }}
          QASE_TESTOPS_RUN_TITLE: API tests shard ${{ matrix.shard }}

      - name: Upload API artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-artifacts-shard${{ matrix.shard }}
          path: |
            allure-results/
            api-results-shard${{ matrix.shard }}.xml
          retention-days: 7

  # -------------------------------------------------------------------------
  # UI tests — browser matrix × shard matrix
  # -------------------------------------------------------------------------
  ui-tests:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
        shard: [1, 2]

    services:
      gitea:
        image: gitea/gitea:latest
        ports:
          - 3000:3000
        env:
          GITEA__security__INSTALL_LOCK: "true"
          GITEA__server__ROOT_URL: http://localhost:3000
          GITEA__database__DB_TYPE: sqlite3
        options: >-
          --health-cmd "wget -qO- http://localhost:3000/api/healthz || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: playwright-${{ runner.os }}-${{ matrix.browser }}-

      - name: Install Playwright browser
        run: |
          playwright install ${{ matrix.browser }}
          playwright install-deps ${{ matrix.browser }}

      - name: Create Gitea admin user and generate token
        id: seed
        run: |
          GITEA_CTR=$(docker ps -q --filter ancestor=gitea/gitea:latest)
          docker exec -u git $GITEA_CTR gitea admin user create \
            --username ${{ env.GITEA_ADMIN_USER }} \
            --password ${{ env.GITEA_ADMIN_PASS }} \
            --email ${{ env.GITEA_ADMIN_USER }}@example.com \
            --admin --must-change-password=false
          TOKEN=$(docker exec -u git $GITEA_CTR gitea admin user generate-access-token \
            --username ${{ env.GITEA_ADMIN_USER }} \
            --token-name ci-token --raw)
          echo "api_token=$TOKEN" >> $GITHUB_OUTPUT
          echo "Token generated: ${TOKEN:0:8}..."

      - name: Seed Gitea instance
        run: python scripts/seed_gitea.py
        env:
          BASE_URL: ${{ env.GITEA_BASE_URL }}
          GITEA_USERNAME: ${{ env.GITEA_ADMIN_USER }}
          GITEA_PASSWORD: ${{ env.GITEA_ADMIN_PASS }}
          API_TOKEN: ${{ steps.seed.outputs.api_token }}

      - name: Run UI tests (${{ matrix.browser }} group ${{ matrix.shard }}/2)
        run: >
          pytest
          -m ui
          --browser ${{ matrix.browser }}
          --splits=2 --group=${{ matrix.shard }}
          --alluredir=allure-results
          --junit-xml=ui-results-${{ matrix.browser }}-shard${{ matrix.shard }}.xml
          --reruns 2 --reruns-delay 3
        env:
          BASE_URL: ${{ env.GITEA_BASE_URL }}
          API_BASE_URL: ${{ env.GITEA_API_URL }}
          GITEA_USERNAME: ${{ env.GITEA_ADMIN_USER }}
          GITEA_PASSWORD: ${{ env.GITEA_ADMIN_PASS }}
          API_TOKEN: ${{ steps.seed.outputs.api_token }}
          QASE_MODE: testops
          QASE_TESTOPS_PROJECT: GITEA
          QASE_TESTOPS_API_TOKEN: ${{ secrets.TMS_TOKEN }}
          QASE_TESTOPS_RUN_TITLE: UI tests ${{ matrix.browser }} shard ${{ matrix.shard }}

      - name: Upload UI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-artifacts-${{ matrix.browser }}-shard${{ matrix.shard }}
          path: |
            allure-results/
            ui-results-${{ matrix.browser }}-shard${{ matrix.shard }}.xml
            screenshots/
          retention-days: 7

  # -------------------------------------------------------------------------
  # Merge allure-results and publish to GitHub Pages
  # -------------------------------------------------------------------------
  publish-allure:
    needs: [api-tests, ui-tests]
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all allure-results artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Merge allure-results into single directory
        run: |
          mkdir -p allure-results
          find downloaded-artifacts -type d -name "allure-results" | while read dir; do
            cp -r "$dir"/. allure-results/ || true
          done
          echo "Allure results count: $(ls allure-results | wc -l)"

      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline --save-dev
          allure --version

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          destination_dir: allure
