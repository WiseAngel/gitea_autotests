name: Gitea E2E UI Regression

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

env:
  GITEA_ADMIN_USER: testadmin
  GITEA_ADMIN_PASS: testadmin123
  GITEA_BASE_URL: http://localhost:3000
  GITEA_API_URL: http://localhost:3000/api/v1

jobs:
  component-tests:
    name: Component tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]

    services:
      gitea:
        image: gitea/gitea:latest
        ports:
          - 3000:3000
        env:
          GITEA__security__INSTALL_LOCK: "true"
          GITEA__server__ROOT_URL: http://localhost:3000
          GITEA__database__DB_TYPE: sqlite3
        options: >-
          --health-cmd "wget -qO- http://localhost:3000/api/healthz || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Gitea test environment
        id: setup
        uses: ./.github/actions/setup-gitea
        with:
          install-browser: 'true'
          browser: ${{ matrix.browser }}
          gitea-admin-user: ${{ env.GITEA_ADMIN_USER }}
          gitea-admin-pass: ${{ env.GITEA_ADMIN_PASS }}
          gitea-base-url: ${{ env.GITEA_BASE_URL }}

      - name: Run component tests (${{ matrix.browser }})
        run: >
          pytest tests/components/
          -m "component and ui"
          --browser ${{ matrix.browser }}
          --alluredir=allure-results
          --junit-xml=component-results-${{ matrix.browser }}.xml
          --reruns 2 --reruns-delay 3
        env:
          BASE_URL: ${{ env.GITEA_BASE_URL }}
          API_BASE_URL: ${{ env.GITEA_API_URL }}
          GITEA_USERNAME: ${{ env.GITEA_ADMIN_USER }}
          GITEA_PASSWORD: ${{ env.GITEA_ADMIN_PASS }}
          API_TOKEN: ${{ steps.setup.outputs.api_token }}
          QASE_MODE: testops
          QASE_TESTOPS_PROJECT: GITEA
          QASE_TESTOPS_API_TOKEN: ${{ secrets.TMS_TOKEN }}
          QASE_TESTOPS_RUN_TITLE: Component tests ${{ matrix.browser }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: component-artifacts-${{ matrix.browser }}
          path: |
            allure-results/
            component-results-${{ matrix.browser }}.xml
            screenshots/
          retention-days: 7

  e2e-ui:
    name: E2E UI tests (${{ matrix.browser }} shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
        shard: [1, 2]

    services:
      gitea:
        image: gitea/gitea:latest
        ports:
          - 3000:3000
        env:
          GITEA__security__INSTALL_LOCK: "true"
          GITEA__server__ROOT_URL: http://localhost:3000
          GITEA__database__DB_TYPE: sqlite3
        options: >-
          --health-cmd "wget -qO- http://localhost:3000/api/healthz || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Gitea test environment
        id: setup
        uses: ./.github/actions/setup-gitea
        with:
          install-browser: 'true'
          browser: ${{ matrix.browser }}
          gitea-admin-user: ${{ env.GITEA_ADMIN_USER }}
          gitea-admin-pass: ${{ env.GITEA_ADMIN_PASS }}
          gitea-base-url: ${{ env.GITEA_BASE_URL }}

      - name: Run E2E UI tests (${{ matrix.browser }} group ${{ matrix.shard }}/2)
        run: >
          pytest tests/e2e/ tests/integration/
          -m "ui"
          --browser ${{ matrix.browser }}
          --splits=2 --group=${{ matrix.shard }}
          --alluredir=allure-results
          --junit-xml=e2e-results-${{ matrix.browser }}-shard${{ matrix.shard }}.xml
          --reruns 2 --reruns-delay 3
        env:
          BASE_URL: ${{ env.GITEA_BASE_URL }}
          API_BASE_URL: ${{ env.GITEA_API_URL }}
          GITEA_USERNAME: ${{ env.GITEA_ADMIN_USER }}
          GITEA_PASSWORD: ${{ env.GITEA_ADMIN_PASS }}
          API_TOKEN: ${{ steps.setup.outputs.api_token }}
          QASE_MODE: testops
          QASE_TESTOPS_PROJECT: GITEA
          QASE_TESTOPS_API_TOKEN: ${{ secrets.TMS_TOKEN }}
          QASE_TESTOPS_RUN_TITLE: E2E UI tests ${{ matrix.browser }} shard ${{ matrix.shard }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-${{ matrix.browser }}-shard${{ matrix.shard }}
          path: |
            allure-results/
            e2e-results-${{ matrix.browser }}-shard${{ matrix.shard }}.xml
            screenshots/
          retention-days: 7
