name: Gitea E2E UI Regression

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

env:
  GITEA_ADMIN_USER: testadmin
  GITEA_ADMIN_PASS: testadmin123
  GITEA_BASE_URL: http://localhost:3000
  GITEA_API_URL: http://localhost:3000/api/v1

jobs:
  component-tests:
    name: Component tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]

    services:
      gitea:
        image: gitea/gitea:latest
        ports:
          - 3000:3000
        env:
          GITEA__security__INSTALL_LOCK: "true"
          GITEA__server__ROOT_URL: http://localhost:3000
          GITEA__database__DB_TYPE: sqlite3
        options: >-
          --health-cmd "wget -qO- http://localhost:3000/api/healthz || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: playwright-${{ runner.os }}-${{ matrix.browser }}-

      - name: Install Playwright browser
        run: |
          playwright install ${{ matrix.browser }}
          playwright install-deps ${{ matrix.browser }}

      - name: Create Gitea admin user and generate token
        id: seed
        run: |
          GITEA_CTR=$(docker ps -q --filter ancestor=gitea/gitea:latest)
          docker exec $GITEA_CTR gitea admin user create \
            --username ${{ env.GITEA_ADMIN_USER }} \
            --password ${{ env.GITEA_ADMIN_PASS }} \
            --email ${{ env.GITEA_ADMIN_USER }}@example.com \
            --admin --must-change-password=false
          TOKEN=$(docker exec $GITEA_CTR gitea admin user generate-access-token \
            --username ${{ env.GITEA_ADMIN_USER }} \
            --token-name ci-token --raw)
          echo "api_token=$TOKEN" >> $GITHUB_OUTPUT
          echo "Token generated: ${TOKEN:0:8}..."

      - name: Seed Gitea instance
        run: python scripts/seed_gitea.py
        env:
          BASE_URL: ${{ env.GITEA_BASE_URL }}
          GITEA_USERNAME: ${{ env.GITEA_ADMIN_USER }}
          GITEA_PASSWORD: ${{ env.GITEA_ADMIN_PASS }}
          API_TOKEN: ${{ steps.seed.outputs.api_token }}

      - name: Run component tests (${{ matrix.browser }})
        run: >
          pytest tests/components/
          -m "component and ui"
          --browser ${{ matrix.browser }}
          --alluredir=allure-results
          --junit-xml=component-results-${{ matrix.browser }}.xml
          --reruns 2 --reruns-delay 3
        env:
          BASE_URL: ${{ env.GITEA_BASE_URL }}
          API_BASE_URL: ${{ env.GITEA_API_URL }}
          GITEA_USERNAME: ${{ env.GITEA_ADMIN_USER }}
          GITEA_PASSWORD: ${{ env.GITEA_ADMIN_PASS }}
          API_TOKEN: ${{ steps.seed.outputs.api_token }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: component-artifacts-${{ matrix.browser }}
          path: |
            allure-results/
            component-results-${{ matrix.browser }}.xml
            screenshots/
          retention-days: 7

  e2e-ui:
    name: E2E UI tests (${{ matrix.browser }} shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
        shard: [1, 2]

    services:
      gitea:
        image: gitea/gitea:latest
        ports:
          - 3000:3000
        env:
          GITEA__security__INSTALL_LOCK: "true"
          GITEA__server__ROOT_URL: http://localhost:3000
          GITEA__database__DB_TYPE: sqlite3
        options: >-
          --health-cmd "wget -qO- http://localhost:3000/api/healthz || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: playwright-${{ runner.os }}-${{ matrix.browser }}-

      - name: Install Playwright browser
        run: |
          playwright install ${{ matrix.browser }}
          playwright install-deps ${{ matrix.browser }}

      - name: Create Gitea admin user and generate token
        id: seed
        run: |
          GITEA_CTR=$(docker ps -q --filter ancestor=gitea/gitea:latest)
          docker exec $GITEA_CTR gitea admin user create \
            --username ${{ env.GITEA_ADMIN_USER }} \
            --password ${{ env.GITEA_ADMIN_PASS }} \
            --email ${{ env.GITEA_ADMIN_USER }}@example.com \
            --admin --must-change-password=false
          TOKEN=$(docker exec $GITEA_CTR gitea admin user generate-access-token \
            --username ${{ env.GITEA_ADMIN_USER }} \
            --token-name ci-token --raw)
          echo "api_token=$TOKEN" >> $GITHUB_OUTPUT
          echo "Token generated: ${TOKEN:0:8}..."

      - name: Seed Gitea instance
        run: python scripts/seed_gitea.py
        env:
          BASE_URL: ${{ env.GITEA_BASE_URL }}
          GITEA_USERNAME: ${{ env.GITEA_ADMIN_USER }}
          GITEA_PASSWORD: ${{ env.GITEA_ADMIN_PASS }}
          API_TOKEN: ${{ steps.seed.outputs.api_token }}

      - name: Run E2E UI tests (${{ matrix.browser }} group ${{ matrix.shard }}/2)
        run: >
          pytest tests/e2e/ tests/integration/
          -m "ui"
          --browser ${{ matrix.browser }}
          --splits=2 --group=${{ matrix.shard }}
          --alluredir=allure-results
          --junit-xml=e2e-results-${{ matrix.browser }}-shard${{ matrix.shard }}.xml
          --reruns 2 --reruns-delay 3
        env:
          BASE_URL: ${{ env.GITEA_BASE_URL }}
          API_BASE_URL: ${{ env.GITEA_API_URL }}
          GITEA_USERNAME: ${{ env.GITEA_ADMIN_USER }}
          GITEA_PASSWORD: ${{ env.GITEA_ADMIN_PASS }}
          API_TOKEN: ${{ steps.seed.outputs.api_token }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-${{ matrix.browser }}-shard${{ matrix.shard }}
          path: |
            allure-results/
            e2e-results-${{ matrix.browser }}-shard${{ matrix.shard }}.xml
            screenshots/
          retention-days: 7
