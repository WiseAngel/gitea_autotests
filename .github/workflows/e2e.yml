name: Gitea E2E UI Regression

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  e2e-ui:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: playwright-${{ runner.os }}-${{ matrix.browser }}-

      - name: Install Playwright browser
        run: |
          playwright install ${{ matrix.browser }}
          playwright install-deps ${{ matrix.browser }}

      - name: Run E2E UI tests (${{ matrix.browser }} shard ${{ matrix.shard }}/2)
        run: >
          pytest
          -m "e2e and ui"
          --browser ${{ matrix.browser }}
          --shard=${{ matrix.shard }}/2
          --alluredir=allure-results
          --junit-xml=e2e-ui-results-${{ matrix.browser }}-shard${{ matrix.shard }}.xml
          --json-report --json-report-file=report-e2e-${{ matrix.browser }}-shard${{ matrix.shard }}.json
          --reruns 2 --reruns-delay 3
        env:
          BASE_URL: https://gitea.com
          API_BASE_URL: https://gitea.com/api/v1
          API_TOKEN: ${{ secrets.GITEA_API_TOKEN }}
          GITEA_USERNAME: ${{ secrets.GITEA_USERNAME }}
          GITEA_PASSWORD: ${{ secrets.GITEA_PASSWORD }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ui-artifacts-${{ matrix.browser }}-shard${{ matrix.shard }}
          path: |
            allure-results/
            e2e-ui-results-${{ matrix.browser }}-shard${{ matrix.shard }}.xml
            report-e2e-${{ matrix.browser }}-shard${{ matrix.shard }}.json
            playwright-report/
            screenshots/
          retention-days: 7
