name: Gitea API Regression

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Run linting
        run: |
          ruff check src tests scripts
          ruff format --check src tests scripts
          mypy src

  api:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Run API regression
        run: >
          pytest
          -m "api and not ui"
          --alluredir=allure-results
          --junit-xml=api-regression-results.xml
          --reruns 2 --reruns-delay 3
        env:
          BASE_URL: https://gitea.com
          API_BASE_URL: https://gitea.com/api/v1
          API_TOKEN: ${{ secrets.GITEA_API_TOKEN }}
          GITEA_USERNAME: ${{ secrets.GITEA_USERNAME }}
          GITEA_PASSWORD: ${{ secrets.GITEA_PASSWORD }}
          TMS_API_URL: ${{ secrets.TMS_API_URL }}
          TMS_TOKEN: ${{ secrets.TMS_TOKEN }}

      - name: Upload API artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-regression-artifacts
          path: |
            allure-results/
            api-regression-results.xml
          retention-days: 7
